<!DOCTYPE html>
<html>
    <body>
        <dialog>
            <header>
                Stardate
                <button class="close" role="button">⤫</button>
            </header>
            <main>
                <p class="current-stardate">Current: <strong class="current-value">—</strong></p>

                <div class="mode-switcher">
                    <button class="mode-btn active" data-mode="tng" type="button">TNG Era</button>
                    <button class="mode-btn" data-mode="tos" type="button">TOS Era</button>
                </div>

                <fieldset data-mode="tng" class="active">
                    <legend>TNG Calculator (2323+)</legend>
                    <div class="date-row">
                        <label>
                            Year
                            <input type="number" class="calc-year" min="2323" step="1" value="2371">
                        </label>
                        <label>
                            Month
                            <input type="number" class="calc-month" min="1" max="12" step="1" value="1">
                        </label>
                        <label>
                            Day
                            <input type="number" class="calc-day" min="1" max="31" step="1" value="1">
                        </label>
                        <label>
                            Hour
                            <input type="number" class="calc-hour" min="0" max="23" step="1" value="0">
                        </label>
                    </div>
                    <div class="calc-result">
                        <label>Stardate:</label>
                        <input type="text" class="tng-stardate stardate-input" placeholder="—" inputmode="decimal">
                        <button class="use-calculated" type="button">Use</button>
                    </div>
                    <div class="era-context" hidden>
                        <div class="era-series"></div>
                        <div class="era-events"></div>
                    </div>
                </fieldset>

                <fieldset data-mode="tos">
                    <legend>TOS/DIS Calculator (2255–2322)</legend>
                    <div class="date-row">
                        <label>
                            Year
                            <input type="number" class="tos-year" min="2255" max="2322" step="1" value="2266">
                        </label>
                        <label>
                            Month
                            <input type="number" class="tos-month" min="1" max="12" step="1" value="1">
                        </label>
                        <label>
                            Day
                            <input type="number" class="tos-day" min="1" max="31" step="1" value="1">
                        </label>
                        <label>
                            Hour
                            <input type="number" class="tos-hour" min="0" max="23" step="1" value="0">
                        </label>
                    </div>
                    <div class="calc-result">
                        <label>Stardate:</label>
                        <input type="text" class="tos-stardate stardate-input" placeholder="—" inputmode="decimal">
                        <button class="use-tos" type="button">Use</button>
                    </div>
                    <div class="tos-era-context" hidden>
                        <div class="era-series tos-era-series"></div>
                        <div class="era-events tos-era-events"></div>
                    </div>
                </fieldset>

            </main>
            <footer>
                <button class="close" role="button">Close</button>
            </footer>
        </dialog>
    </body>
</html>
